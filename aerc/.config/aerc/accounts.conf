[kongvanny2000@gmail.com]
source         = maildir://~/.mail/gmail
outgoing       = msmtpq -a gmail
from           = Kong Vanny <kongvanny2000@gmail.com>
copy-to        = Sent
folder-map     = ~/.config/aerc/folder-maps/gmail-folder-map
folders        = INBOX,Sent,Drafts,Trash,Spam,Archive
folders-sort   = INBOX,Sent,Drafts,Archive,Spam,Trash
check-mail     = 3m
check-mail-cmd = mbsync gmail

[shoprunback]
source            = maildir://~/.mail/shoprunback
outgoing          = msmtpq -a shoprunback
from              = Kong Vanny <vanny@shoprunback.com>
folders           = INBOX,Sent,Drafts,Archive,Spam,Trash
folders-sort      = INBOX,Sent,Drafts,Archive,Spam,Trash
folder-map        = ~/.config/aerc/folder-maps/o365-folder-map
signature-file    = ~/.config/aerc/signatures/srb-signature.txt
check-mail        = 3m
check-mail-cmd    = mbsync shoprunback
check-mail-timeout = 120s
