gui:
  theme:
    activeBorderColor:
      - "#3e8fb0"
      - bold
    inactiveBorderColor:
      - "#6e6a86"
    searchingActiveBorderColor:
      - "#ea9a97"
      - bold
    optionsTextColor:
      - "#9ccfd8"
    selectedLineBgColor:
      - "#2a273f"
    inactiveViewSelectedLineBgColor:
      - "#393552"
      - bold
    cherryPickedCommitFgColor:
      - "#2a273f"
    cherryPickedCommitBgColor:
      - "#ea9a97"
    markedBaseCommitFgColor:
      - "#9ccfd8"
    markedBaseCommitBgColor:
      - "#f6c177"
    unstagedChangesColor:
      - "#eb6f92"
    defaultFgColor:
      - "#e0def4"
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --syntax-theme rose-pine --side-by-side
customCommands:
  - key: "<c-g>"
    context: "files"
    description: "Generate commit message with Claude Code"
    command: "git diff --staged | /opt/homebrew/bin/claude -p 'Generate a concise git commit message for these staged changes. Output ONLY the raw commit message with no markdown, no code blocks, no backticks, no explanations. Use conventional commit format.' --model haiku --output-format text > /tmp/commit_msg && GIT_EDITOR=nvim git  commit -e -F /tmp/commit_msg"
    output: terminal
